    <script type="module">
        import { getApps, initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import {
            getFirestore, collection, addDoc, onSnapshot,
            query, doc, updateDoc, deleteDoc
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD81sF9ClxA_HKRaEkmCSyHXXRCHR1efkk",
            authDomain: "car-xpert-76d1b.firebaseapp.com",
            projectId: "car-xpert-76d1b",
            storageBucket: "car-xpert-76d1b.firebasestorage.app",
            messagingSenderId: "180376885101",
            appId: "1:180376885101:web:0cdfffab3fe965e1722c64",
            measurementId: "G-7E0D6YT43R"
        };
        const app = getApps()[0]; 
        const db  = getFirestore(app);

        document.getElementById('restockReceived').valueAsDate = new Date();

        let allProducts          = [];
        let activeCategoryFilter = 'All';
        let activeConditionFilter = 'All';   

        const TRUCK_MAP = {
            'isuzu elf':      ['4hf1','4hg1','4he1','4jb1','4bc2','4be1','4bd1'],
            'isuzu forward':  ['6hh1','6hk1','6sd1','6bg1'],
            'isuzu giga':     ['6wf1','6wg1','6sd1'],
            'isuzu npr':      ['4hf1','4he1','4jj1'],
            'fuso canter':    ['4d32','4d33','4d34','4d35','4m50'],
            'mitsubishi canter': ['4d32','4d33','4d34','4d35','4m50'],
            'hino ranger':    ['j08c','j08e','ef750','fd','fe6']
        };

        function smartMatch(item, rawQuery) {
            if (!rawQuery) return true;
            const q = rawQuery.toLowerCase().trim();

            // Check exact barcode match first
            if (item.barcode && item.barcode.toLowerCase() === q) return true;

            const expandedTerms = new Set([q]);
            for (const [truckModel, engines] of Object.entries(TRUCK_MAP)) {
                if (truckModel.includes(q) || q.includes(truckModel)) engines.forEach(e => expandedTerms.add(e));
                if (engines.some(e => e === q)) expandedTerms.add(truckModel);
            }

            const haystack = [
                item.name || '', item.oem || '', item.category || '', item.barcode || '', item.condition || '',
                ...(item.compatTags || [])          
            ].join(' ').toLowerCase();

            return [...expandedTerms].some(term => haystack.includes(term));
        }

        document.getElementById('prodSupplyPrice').addEventListener('input', function() {
            const supply = parseFloat(this.value) || 0;
            document.getElementById('prodPrice').value = (supply * 1.35).toFixed(2);
        });

        document.getElementById('editProdSupplyPrice').addEventListener('input', function() {
            const supply = parseFloat(this.value) || 0;
            document.getElementById('editProdPrice').value = (supply * 1.35).toFixed(2);
        });

        const compressImage = (file) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    let [w, h] = [img.width, img.height];
                    const MAX = 800;
                    if (w > h) { if (w > MAX) { h *= MAX/w; w = MAX; } }
                    else       { if (h > MAX) { w *= MAX/h; h = MAX; } }
                    canvas.width = w; canvas.height = h;
                    ctx.drawImage(img, 0, 0, w, h);
                    resolve(canvas.toDataURL('image/jpeg', 0.7));
                };
            };
            reader.onerror = reject;
        });

        window.previewFile = (type, input) => {
            const img = document.getElementById(type === 'add' ? 'addImgPreview' : 'editImgPreview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => { img.src = e.target.result; img.style.display = 'block'; };
                reader.readAsDataURL(input.files[0]);
            }
        };

        function parseCompatTags(str) {
            if (!str) return [];
            return str.split(',').map(t => t.trim()).filter(Boolean);
        }

        onSnapshot(query(collection(db, "products")), (snapshot) => {
            allProducts = [];
            snapshot.forEach((d) => {
                const item = d.data();
                item.id = d.id;
                if (!item.compatTags) item.compatTags = parseCompatTags(item.compat || '');
                allProducts.push(item);
            });
            window.allProductsGlobal = allProducts;
            applyFilters();
        });

        window.renderTable = function(productsToRender) {
            const tbody = document.getElementById('inventoryTableBody');
            tbody.innerHTML = "";

            if (productsToRender.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center py-4 text-muted">No auto parts found.</td></tr>';
                return;
            }

            productsToRender.forEach((item) => {
                let rowClass = "";
                if (item.stock === 0)      rowClass = "table-danger text-muted";
                else if (item.stock < 5)   rowClass = "table-warning";

                const isSurplus = item.condition === 'Surplus';
                const condBadge = `<span class="badge ${isSurplus ? 'badge-surplus' : 'badge-brandnew'} small">${isSurplus ? '🟠 Surplus' : '🟢 Brand New'}</span>`;

                const tags = (item.compatTags || []).map(t => `<span class="truck-tag">${t}</span>`).join('') || '<small class="text-muted">—</small>';
                
                // Show barcode if OEM doesn't exist
                const codeDisplay = item.oem ? item.oem : (item.barcode ? `<i class="bi bi-upc"></i> ${item.barcode}` : 'N/A');

                tbody.innerHTML += `
                    <tr class="${rowClass}">
                        <td class="ps-4 fw-bold">${item.name}<br><div class="mt-1">${tags}</div></td>
                        <td>${condBadge}</td>
                        <td class="text-muted">${item.category}</td>
                        <td class="text-dark fw-bold small">${codeDisplay}</td>
                        <td class="text-secondary">₱${(item.supplyPrice || 0).toFixed(2)}</td>
                        <td><span class="text-danger fw-bold">₱${(item.price || 0).toFixed(2)}</span></td>
                        <td><span class="badge ${item.stock > 0 ? 'bg-success' : 'bg-danger'} fs-6">${item.stock}</span></td>
                        <td class="text-end pe-4">
                            <button class="btn btn-sm btn-success me-1 restock-btn" data-id="${item.id}" title="Restock"><i class="bi bi-truck"></i></button>
                            <button class="btn btn-sm btn-outline-primary edit-btn me-1" data-id="${item.id}" title="Edit"><i class="bi bi-pencil"></i></button>
                            <button class="btn btn-sm btn-outline-danger delete-btn" data-id="${item.id}" data-name="${item.name}"><i class="bi bi-trash"></i></button>
                        </td>
                    </tr>`;
            });

            attachButtonListeners();
        };

        function applyFilters() {
            const searchQuery = (document.getElementById('searchInput')?.value || '').trim();
            let results = allProducts;
            if (activeCategoryFilter !== 'All') results = results.filter(i => i.category === activeCategoryFilter);
            if (activeConditionFilter !== 'All') results = results.filter(i => (i.condition || 'Brand New') === activeConditionFilter);
            if (searchQuery) results = results.filter(i => smartMatch(i, searchQuery));
            renderTable(results);
        }

        window.filterCategory = function(cat) {
            activeCategoryFilter = cat;
            document.querySelectorAll('.cat-btn').forEach(btn => {
                const isActive = btn.innerText.includes(cat) || (cat === 'All' && btn.innerText.includes('All'));
                btn.classList.toggle('btn-dark', isActive);
                btn.classList.toggle('btn-outline-secondary', !isActive);
            });
            applyFilters();
        };

        window.setConditionFilter = function(cond) {
            activeConditionFilter = cond;
            document.getElementById('pillAll').className     = 'filter-pill' + (cond === 'All'       ? ' active-new' : '');
            document.getElementById('pillNew').className     = 'filter-pill' + (cond === 'Brand New' ? ' active-new' : '');
            document.getElementById('pillSurplus').className = 'filter-pill' + (cond === 'Surplus'   ? ' active-surplus' : '');
            applyFilters();
        };

        document.getElementById('searchInput').addEventListener('input', applyFilters);

        function attachButtonListeners() {
            document.querySelectorAll('.restock-btn').forEach(btn => btn.addEventListener('click', e => openRestockModal(allProducts.find(x => x.id === e.target.closest('button').dataset.id))));
            document.querySelectorAll('.edit-btn').forEach(btn => btn.addEventListener('click', e => openEditModal(allProducts.find(x => x.id === e.target.closest('button').dataset.id))));
            document.querySelectorAll('.delete-btn').forEach(btn => btn.addEventListener('click', async e => {
                const b = e.target.closest('button');
                if (confirm(`Delete "${b.dataset.name}"?`)) await deleteDoc(doc(db, "products", b.dataset.id));
            }));
        }

        // ══════════════════════════════════════════════════════
        // 4A. SAVE NEW PART
        // ══════════════════════════════════════════════════════
        document.getElementById('btnSaveProduct').addEventListener('click', async () => {
            const btn = document.getElementById('btnSaveProduct');

            const name           = document.getElementById('prodName').value.trim();
            const barcode        = document.getElementById('prodBarcode').value.trim(); // ★ New Barcode Field
            const oem            = document.getElementById('prodOEM').value.trim();
            const compatRaw      = document.getElementById('prodCompat').value.trim();    
            const supplyPrice    = parseFloat(document.getElementById('prodSupplyPrice').value) || 0;
            const price          = parseFloat(document.getElementById('prodPrice').value);
            const stock          = parseInt(document.getElementById('prodStock').value);
            const category       = document.getElementById('prodCategory').value;
            const condition      = document.getElementById('prodCondition').value;        

            if (!name || isNaN(supplyPrice) || isNaN(stock)) {
                alert("Please fill in Name, Supply Cost, and Stock."); return;
            }

            btn.disabled = true; btn.innerText = "Saving…";

            const fileInput = document.getElementById('prodImgFile');
            let finalImage  = "";

            try {
                if (fileInput.files[0]) finalImage = await compressImage(fileInput.files[0]);
                const compatTags = parseCompatTags(compatRaw);

                const productData = {
                    name, barcode, oem, compat: compatRaw, compatTags, condition, supplyPrice, price, stock, category,
                    image: finalImage, createdAt: new Date()
                };

                const saveTask = addDoc(collection(db, "products"), productData);
                const timeoutTask = new Promise((_, reject) => setTimeout(() => reject(new Error("Network Timeout.")), 7000));

                await Promise.race([saveTask, timeoutTask]);

                document.querySelector('#addProductModal .btn-close').click();
                document.getElementById('addProductForm').reset();
                document.getElementById('addImgPreview').style.display = 'none';
                setTimeout(() => alert("✅ Auto Part Added Successfully!"), 400);

            } catch (e) { alert("Error: " + e.message); } 
            finally { btn.disabled = false; btn.innerHTML = '<i class="bi bi-save me-1"></i>Save Part'; }
        });

        // ══════════════════════════════════════════════════════
        // 4B. RESTOCK SHIPMENT 
        // ══════════════════════════════════════════════════════
        document.getElementById('btnSubmitRestock').addEventListener('click', async () => {
            const id   = document.getElementById('restockProdId').value;
            const qty  = parseInt(document.getElementById('restockQty').value);
            const cost = parseFloat(document.getElementById('restockCost').value);
            const btn  = document.getElementById('btnSubmitRestock');

            if (!id || isNaN(qty) || isNaN(cost) || qty < 1) { alert("Check all fields."); return; }

            const product      = allProducts.find(p => p.id === id);
            const newTotalStock = product.stock + qty;
            const oldValue     = (product.supplyPrice || 0) * product.stock;
            const newAvgCost   = (oldValue + cost * qty) / newTotalStock;
            const newRetailPrice = newAvgCost * 1.35; 

            btn.disabled = true; btn.innerText = "Processing...";

            try {
                const updateTask = updateDoc(doc(db, "products", id), { stock: newTotalStock, supplyPrice: newAvgCost, price: newRetailPrice });
                const timeoutTask = new Promise((_, reject) => setTimeout(() => reject(new Error("Network Timeout")), 7000));
                await Promise.race([updateTask, timeoutTask]);
                
                document.querySelector('#restockModal .btn-close').click();
                setTimeout(() => alert("✅ Stock Updated Successfully!"), 400);
            } catch (e) { alert("Error: " + e.message); } 
            finally { btn.disabled = false; btn.innerHTML = '<i class="bi bi-check-circle me-1"></i>Confirm Restock'; }
        });

        // ══════════════════════════════════════════════════════
        // 4C. UPDATE PART DETAILS
        // ══════════════════════════════════════════════════════
        document.getElementById('btnUpdateProduct').addEventListener('click', async () => {
            const btn = document.getElementById('btnUpdateProduct');

            const id             = document.getElementById('editProdId').value;
            const name           = document.getElementById('editProdName').value.trim();
            const barcode        = document.getElementById('editProdBarcode').value.trim(); // ★ New Barcode Field
            const oem            = document.getElementById('editProdOEM').value.trim();
            const compatRaw      = document.getElementById('editProdCompat').value.trim();    
            const supplyPrice    = parseFloat(document.getElementById('editProdSupplyPrice').value) || 0;
            const price          = parseFloat(document.getElementById('editProdPrice').value);
            const category       = document.getElementById('editProdCategory').value;
            const condition      = document.getElementById('editProdCondition').value;        
            const manualStock    = parseInt(document.getElementById('editProdStock').value);

            if (!name || isNaN(supplyPrice) || isNaN(manualStock)) { alert("Check required fields."); return; }

            btn.disabled = true; btn.innerText = "Updating…";
            const fileInput = document.getElementById('editProdImgFile');

            try {
                const compatTags = parseCompatTags(compatRaw);
                let updateData = { name, barcode, oem, compat: compatRaw, compatTags, condition, supplyPrice, price, category, stock: manualStock };
                if (fileInput.files[0]) updateData.image = await compressImage(fileInput.files[0]);

                const updateTask = updateDoc(doc(db, "products", id), updateData);
                const timeoutTask = new Promise((_, reject) => setTimeout(() => reject(new Error("Network Timeout")), 7000));
                await Promise.race([updateTask, timeoutTask]);

                document.querySelector('#editProductModal .btn-close').click();
                setTimeout(() => alert("✅ Details Updated!"), 400);

            } catch (e) { alert("Error: " + e.message); } 
            finally { btn.disabled = false; btn.innerHTML = '<i class="bi bi-check-circle me-1"></i>Update Details'; }
        });

        function openRestockModal(item) {
            document.getElementById('restockProdId').value  = item.id;
            document.getElementById('restockProdName').innerText = "Restock: " + item.name;
            document.getElementById('restockCost').value   = item.supplyPrice || 0;
            document.getElementById('restockQty').value    = "";
            new bootstrap.Modal(document.getElementById('restockModal')).show();
        }

        function openEditModal(item) {
            document.getElementById('editProdId').value          = item.id;
            document.getElementById('editProdName').value        = item.name;
            document.getElementById('editProdBarcode').value     = item.barcode || ""; // ★ Load Barcode
            document.getElementById('editProdOEM').value         = item.oem  || "";
            document.getElementById('editProdCompat').value      = item.compat || (item.compatTags || []).join(', '); 
            document.getElementById('editProdCondition').value   = item.condition || 'Brand New';  
            
            document.getElementById('editProdSupplyPrice').value = item.supplyPrice || 0;
            document.getElementById('editProdPrice').value       = item.price || 0;
            document.getElementById('editProdCategory').value    = item.category;
            document.getElementById('editProdStock').value       = item.stock;

            const preview = document.getElementById('editImgPreview');
            document.getElementById('editProdImgFile').value = "";
            if (item.image) { preview.src = item.image; preview.style.display = 'block'; }
            else            { preview.style.display = 'none'; }

            new bootstrap.Modal(document.getElementById('editProductModal')).show();
        }
    </script>
</body>
</html>
