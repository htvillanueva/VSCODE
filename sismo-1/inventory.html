<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAR-XPERT - Auto Supply Inventory</title>
    <link rel="icon" href="assets/img/logo.svg" type="image/svg+xml">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="assets/css/inventory.css">
    <script src="assets/js/components.js"></script>
</head>
<body>

    <div id="sismo-guard" style="position:fixed;inset:0;background:#fff;z-index:99999;display:flex;align-items:center;justify-content:center;"><div class="spinner-border text-danger" role="status"></div></div>
    <script type="module">
        import { getApps, initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        
        // NEW CAR-XPERT KEYS
        const _cfg = { 
            apiKey: "AIzaSyD81sF9ClxA_HKRaEkmCSyHXXRCHR1efkk", 
            authDomain: "car-xpert-76d1b.firebaseapp.com", 
            projectId: "car-xpert-76d1b", 
            storageBucket: "car-xpert-76d1b.firebasestorage.app", 
            messagingSenderId: "180376885101", 
            appId: "1:180376885101:web:0cdfffab3fe965e1722c64",
            measurementId: "G-7E0D6YT43R"
        };
        const _app = getApps().length ? getApps()[0] : initializeApp(_cfg);
        onAuthStateChanged(getAuth(_app), user => {
            if (!user) { window.location.replace('index.html'); return; }
            document.getElementById('sismo-guard').remove();
        });
        window._sismoSignOut = async () => { await signOut(getAuth(_app)); window.location.replace('index.html'); };
    </script>

    <div id="page-header"></div>
    <script>
        const _fromView = new URLSearchParams(window.location.search).get('from') === 'view';
        const _backBtn = backButtonHtml({
            label: 'Back to ' + (_fromView ? 'View Catalogue' : 'Home'),
            mobileLabel: _fromView ? 'Catalogue' : 'Home',
            href: _fromView ? 'view.html' : 'home.html'
        });
        renderPageHeader({
            badge: 'Parts Inventory',
            rightHtml: `
                <div class="d-flex gap-2 align-items-center">
                    ${_backBtn}
                    <button class="btn btn-danger header-btn d-none d-md-inline-flex align-items-center gap-1"
                            data-bs-toggle="modal" data-bs-target="#addProductModal">
                        <i class="bi bi-plus-lg"></i> Add Part
                    </button>
                </div>`
        });
    </script>

    <div id="mobileSearchBar" class="d-none d-md-none px-3 py-2 border-bottom bg-white">
        <div class="input-group">
            <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
            <input type="text" id="mobileSearchInput" class="form-control border-start-0" placeholder="Search parts or OEM...">
            <button class="btn btn-outline-secondary" onclick="closeMobileSearch()"><i class="bi bi-x-lg"></i></button>
        </div>
    </div>

    <div class="container-fluid py-3 py-md-2">

        <div class="row mb-3 d-none d-md-flex">
            <div class="col-md-6 mx-auto">
                <div class="input-group shadow-sm">
                    <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
                    <input type="text" id="searchInput" class="form-control border-start-0" placeholder="Search by name, part number, or category...">
                    <button class="btn btn-danger" type="button" id="btnSearch">Search</button>
                </div>
            </div>
        </div>

        <div class="category-wrapper mb-2">
            <div class="category-scroll text-center">
                <button class="btn btn-dark cat-btn" onclick="filterCategory('All')">All Parts</button>
                <button class="btn btn-outline-secondary cat-btn" onclick="filterCategory('Engine Parts')">Engine Parts</button>
                <button class="btn btn-outline-secondary cat-btn" onclick="filterCategory('Fluids & Oils')">Fluids & Oils</button>
                <button class="btn btn-outline-secondary cat-btn" onclick="filterCategory('Brakes & Suspension')">Brakes & Suspension</button>
                <button class="btn btn-outline-secondary cat-btn" onclick="filterCategory('Electrical')">Electrical</button>
                <button class="btn btn-outline-secondary cat-btn" onclick="filterCategory('Accessories')">Accessories</button>
                <button class="btn btn-outline-secondary cat-btn" onclick="filterCategory('Tools')">Tools</button>
                <button class="btn btn-outline-secondary cat-btn" onclick="filterCategory('Others')">Others</button>
            </div>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4">Part Name</th>
                                <th>Category</th>
                                <th>Part Number</th>
                                <th>Avg Cost</th>
                                <th>Sell Price</th>
                                <th>Stock Level</th>
                                <th class="text-end pe-4">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryTableBody">
                            <tr><td colspan="7" class="text-center py-4 text-muted">Loading auto parts...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="d-md-none" style="height:60px;"></div>
    </div>

    <div class="modal fade" id="addProductModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content border-danger">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title fw-bold">Add New Auto Part</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addProductForm">
                        <div class="mb-3 p-3 bg-light rounded border">
                            <label class="form-label fw-bold small">Part Image</label>
                            <input type="file" id="prodImgFile" class="form-control mb-2" accept="image/*" onchange="previewFile('add', this)">
                            <div class="text-center mt-2">
                                <img id="addImgPreview" src="https://via.placeholder.com/150?text=No+Image" class="img-thumbnail" style="max-height: 100px; display: none;">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Part Name</label>
                            <input type="text" id="prodName" class="form-control" placeholder="Ex: Bosch Spark Plug" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Part Number (OEM)</label>
                            <input type="text" id="prodOEM" class="form-control" placeholder="Ex: FR7DCX+" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Compatibility (Make/Model)</label>
                            <input type="text" id="prodCompat" class="form-control" placeholder="Ex: Toyota Vios 2018+" required>
                        </div>

                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label text-muted">Supply Cost (₱)</label>
                                <input type="number" id="prodSupplyPrice" class="form-control" placeholder="
