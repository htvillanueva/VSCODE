<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISMO - View Catalogue</title>
    <link rel="icon" href="assets/img/logo.svg" type="image/svg+xml">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/view.css">
    <script src="assets/js/components.js"></script>

    <style>
        /* product area needs bottom padding for fixed mobile panels */
        @media (max-width: 767.98px) {
            .product-area { padding-bottom: 180px; }
        }
    </style>
</head>
<body>

    <!-- ── Auth Guard ───────────────────────────── -->
    <div id="sismo-guard" style="position:fixed;inset:0;background:#fff;z-index:99999;display:flex;align-items:center;justify-content:center;"><div class="spinner-border text-secondary" role="status"></div></div>
    <script type="module">
        import { getApps, initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        const _cfg = { apiKey:"AIzaSyAlTpK3kiqIGXsYZHgmES6MBaepo_5_i6Q", authDomain:"sismo-5323c.firebaseapp.com", projectId:"sismo-5323c", storageBucket:"sismo-5323c.firebasestorage.app", messagingSenderId:"179304155395", appId:"1:179304155395:web:fa017fa581335f4f140136" };
        const _app = getApps().length ? getApps()[0] : initializeApp(_cfg);
        onAuthStateChanged(getAuth(_app), user => {
            if (!user) { window.location.replace('index.html'); return; }
            document.getElementById('sismo-guard').remove();
        });
        window._sismoSignOut = async () => { await signOut(getAuth(_app)); window.location.replace('index.html'); };
    </script>

    <div id="page-header"></div>
    <script>
        renderPageHeader({
            badge: 'View Catalogue',
            rightHtml: backButtonHtml({ label: 'Back to Home', mobileLabel: 'Home', href: 'home.html' }),
            containerClass: 'container-fluid px-3 pt-2 pb-1 mb-1'
        });
    </script>

    <!-- Search bar: lives at top-level so it's always visible on mobile -->
    <div id="search-bar-container" class="d-none border-bottom bg-white px-3 py-2">
        <div class="input-group">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input type="text" id="searchInput" class="form-control" placeholder="Type product name...">
            <button class="btn btn-outline-secondary" id="btnCloseSearch">Close</button>
        </div>
    </div>

    <div class="container-fluid px-1 pt-0 pb-3 pos-wrapper">
        <div class="row g-0 pos-container">
            <div class="col-md-3 order-list-panel d-none d-md-flex flex-column">
                <div class="p-3 bg-dark text-white fw-bold d-flex justify-content-between">
                    <span>ORDER LIST</span>
                    <span id="item-count-badge" class="badge bg-danger">0</span>
                </div>
                
                <div class="order-items flex-grow-1" id="cartContainer" style="overflow-y: auto;">
                    <div class="text-center text-muted mt-5">
                        <i class="bi bi-basket display-4"></i>
                        <p class="mt-2">No Items Yet</p>
                    </div>
                </div>

                <div class="order-total-section p-3 border-top bg-light">
                    <div class="d-flex justify-content-between mb-2">
                        <span class="fw-bold fs-5">TOTAL AMOUNT:</span>
                        <span class="fw-bold text-danger fs-4" id="totalPriceDisplay">₱0.00</span>
                    </div>

                    <div class="mb-3">
                        <div class="input-group mb-2">
                            <span class="input-group-text fw-bold bg-white"><i class="bi bi-cash"></i></span>
                            <input type="text" inputmode="decimal" id="amountPaidInput" class="form-control fw-bold fs-5 text-end" placeholder="0.00" autocomplete="off">
                        </div>
                        <div class="d-flex justify-content-between align-items-center px-1">
                            <span class="small fw-bold text-muted">CHANGE:</span>
                            <span class="fw-bold fs-4 text-success" id="changeDisplay">₱0.00</span>
                        </div>
                    </div>

                    <button id="btnPay" class="btn btn-primary w-100 fw-bold py-3 fs-5 shadow-sm">PAYMENT</button>
                </div>
            </div>

            <div class="col-md-7 product-area">
                
                <div class="category-wrapper">
                    <button class="scroll-arrow left" onclick="scrollCategories(-200)"><i class="bi bi-chevron-left"></i></button>
                    
                    <div class="category-scroll" id="catScrollContainer">
                        <button class="btn btn-dark cat-btn" onclick="filterCategory('All')">All Items</button>
                        <button class="btn btn-outline-dark cat-btn" onclick="filterCategory('Beverages')">Beverages</button>
                        <button class="btn btn-outline-dark cat-btn" onclick="filterCategory('Biscuits')">Biscuits</button>
                        <button class="btn btn-outline-dark cat-btn" onclick="filterCategory('Cigarretes')">Cigarretes</button>
                        <button class="btn btn-outline-dark cat-btn" onclick="filterCategory('Chips')">Chips</button>
                        <button class="btn btn-outline-dark cat-btn" onclick="filterCategory('Candies')">Candies</button>
                        <button class="btn btn-outline-dark cat-btn" onclick="filterCategory('Condiments')">Condiments</button>
                        <button class="btn btn-outline-dark cat-btn" onclick="filterCategory('Canned Goods')">Canned Goods</button>
                        <button class="btn btn-outline-dark cat-btn" onclick="filterCategory('Frozen Goods')">Frozen Goods</button>
                        <button class="btn btn-outline-dark cat-btn" onclick="filterCategory('Laundry Detergent')">Laundry Detergent</button>
                        <button class="btn btn-outline-dark cat-btn" onclick="filterCategory('Mobile Load')">Mobile Load</button>
                        <button class="btn btn-outline-dark cat-btn" onclick="filterCategory('Noodles')">Noodles</button>
                        <button class="btn btn-outline-dark cat-btn" onclick="filterCategory('School Supplies')">School Supplies</button>
                        <button class="btn btn-outline-dark cat-btn" onclick="filterCategory('Toiletries')">Toiletries</button>
                        <button class="btn btn-outline-dark cat-btn" onclick="filterCategory('Others')">Others</button>
                    </div>

                    <button class="scroll-arrow right" onclick="scrollCategories(200)"><i class="bi bi-chevron-right"></i></button>
                </div>

                <h5 class="mb-3 text-muted" id="grid-title">Select Products</h5>
                
                <div class="row g-2" id="productGrid">
                    <div class="text-center py-5">
                        <div class="spinner-border text-primary"></div>
                        <p>Loading Inventory...</p>
                    </div>
                </div>
            </div>

            <div class="col-md-2 action-panel d-none d-md-flex flex-column">
                <button class="btn btn-light action-btn text-primary" onclick="toggleSearch()">
                    <i class="bi bi-search"></i> Search
                </button>
                <button class="btn btn-light action-btn text-danger" onclick="clearCart()">
                    <i class="bi bi-x-circle"></i> CLEAR
                </button>
                <button class="btn btn-light action-btn" onclick="checkStock()">
                    <i class="bi bi-box-seam"></i> STOCK
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { getApps, initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, getDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAlTpK3kiqIGXsYZHgmES6MBaepo_5_i6Q",
            authDomain: "sismo-5323c.firebaseapp.com",
            projectId: "sismo-5323c",
            messagingSenderId: "179304155395",
            appId: "1:179304155395:web:fa017fa581335f4f140136"
        };

        const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- GLOBAL VARIABLES ---
        let allProducts = [];
        let cart = [];
        let currentCustomer = "Walk-in";

        // --- 1. LOAD PRODUCTS ---
        const productGrid = document.getElementById('productGrid');
        
        onSnapshot(collection(db, "products"), (snapshot) => {
            allProducts = [];
            productGrid.innerHTML = "";
            
            snapshot.forEach((doc) => {
                let p = doc.data();
                p.id = doc.id;
                allProducts.push(p);
            });

            renderProducts(allProducts);
        });

        // --- 2. RENDER PRODUCTS (Updated with better Layout) ---
        window.renderProducts = function(productsToRender) {
            productGrid.innerHTML = "";
            
            const today = new Date();
            const todayStr = today.toISOString().split('T')[0];

            const bufferDate = new Date(today);
            bufferDate.setDate(today.getDate() + 3);
            const bufferStr = bufferDate.toISOString().split('T')[0]; 
            
            if(productsToRender.length === 0) {
                productGrid.innerHTML = '<p class="text-center text-muted">No products found.</p>';
                return;
            }

            productsToRender.forEach(p => {
                let activeBatches = (p.batches || []).filter(b => b.qty > 0);
                activeBatches.sort((a,b) => new Date(a.expiry) - new Date(b.expiry));
                let nearestExpiry = activeBatches.length > 0 ? activeBatches[0].expiry : (p.expirationDate || "N/A");

                let isExpired = false;
                let isNearExpiry = false; 
                
                if (nearestExpiry !== "N/A") {
                    if (nearestExpiry < todayStr) {
                        isExpired = true; 
                    } else if (nearestExpiry <= bufferStr) {
                        isNearExpiry = true; 
                    }
                }

                // Consolidate card state into 4 mutually-exclusive cases
                let cardClass, clickAction, statusText, statusColor;
                if (isExpired) {
                    cardClass = 'product-card disabled'; clickAction = '';
                    statusText = 'EXPIRED';      statusColor = 'text-danger fw-bold';
                } else if (isNearExpiry) {
                    cardClass = 'product-card disabled'; clickAction = '';
                    statusText = 'NEAR EXPIRY';  statusColor = 'text-warning fw-bold';
                } else if (p.stock <= 0) {
                    cardClass = 'product-card disabled'; clickAction = '';
                    statusText = 'Out of Stock'; statusColor = 'text-danger';
                } else {
                    cardClass = 'product-card'; clickAction = `addToCart('${p.id}')`;
                    statusText = `${p.stock} left`; statusColor = 'text-muted';
                }

                // IMAGE LOGIC
                const imgSrc = p.image || "https://placehold.co/150x120?text=No+Image";

                // We replaced <h6 class="text-truncate"> with <div class="product-title">
                let html = `
                <div class="col-4 col-lg-3">
                    <div class="card ${cardClass} p-2 text-center" onclick="${clickAction}">
                        <div class="card-body p-1 d-flex flex-column h-100">
                            <img src="${imgSrc}" class="product-card-img" alt="${p.name}">
                            
                            <div class="product-title" title="${p.name}">
                                ${p.name}
                            </div>

                            <div class="mt-auto">
                                <small class="text-primary fw-bold d-block">₱${p.price.toFixed(2)}</small>
                                <small class="${statusColor} small">${statusText}</small>
                            </div>
                        </div>
                    </div>
                </div>`;
                productGrid.innerHTML += html;
            });
        }

        // --- 3. CART FUNCTIONS ---
        window.addToCart = function(id) {
            let product = allProducts.find(p => p.id === id);
            let existingItem = cart.find(item => item.id === id);

            if (existingItem) {
                if(existingItem.qty + 1 > product.stock) {
                    alert("Not enough stock!");
                    return;
                }
                existingItem.qty++;
            } else {
                cart.push({
                    id: product.id,
                    name: product.name,
                    price: product.price,
                    stock: product.stock,
                    image: product.image,
                    qty: 1
                });
            }
            updateCartUI();
        }

        function updateCartUI() {
            const container   = document.getElementById('cartContainer');
            const totalDisplay = document.getElementById('totalPriceDisplay');
            const countBadge  = document.getElementById('item-count-badge');

            const _mc = document.getElementById('mobileCartContainer');
            const _mb = document.getElementById('mobile-item-count');
            const _mt = document.getElementById('mobileTotalDisplay');

            if (cart.length === 0) {
                const emptyHTML = `<div class="text-center text-muted mt-5"><i class="bi bi-basket display-4"></i><p class="mt-2">No Items Yet</p></div>`;
                container.innerHTML = emptyHTML;
                totalDisplay.innerText = "₱0.00";
                countBadge.innerText = "0";
                if (_mc) _mc.innerHTML = emptyHTML;
                if (_mb) _mb.innerText = '0';
                if (_mt) _mt.innerText = '\u20b10.00';
                calculateChange();
                return;
            }

            // Build all rows in one pass, then write innerHTML once (avoids repeated reflows)
            let grandTotal = 0, totalItems = 0;
            const rows = cart.map((item, index) => {
                const itemTotal = item.price * item.qty;
                grandTotal += itemTotal;
                totalItems += item.qty;
                const thumbSrc = item.image || "https://placehold.co/50?text=?";
                return `<div class="p-2 border-bottom bg-white mb-1">
                    <div class="d-flex align-items-center">
                        <img src="${thumbSrc}" class="rounded me-2 shadow-sm" style="width:50px;height:50px;object-fit:cover;">
                        <div class="flex-grow-1">
                            <div class="d-flex justify-content-between align-items-start">
                                <span class="fw-bold text-truncate" style="max-width:120px;" title="${item.name}">${item.name}</span>
                                <span class="fw-bold text-primary">₱${itemTotal.toFixed(2)}</span>
                            </div>
                            <div class="d-flex justify-content-between align-items-center mt-1">
                                <small class="text-muted" style="font-size:0.8rem;">₱${item.price} x ${item.qty}</small>
                                <div>
                                    <button class="btn btn-sm btn-outline-danger py-0 px-2" onclick="adjustQty(${index},-1)">-</button>
                                    <button class="btn btn-sm btn-outline-success py-0 px-2" onclick="adjustQty(${index},1)">+</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;
            });

            const cartHTML = rows.join('');
            container.innerHTML = cartHTML;
            totalDisplay.innerText = "₱" + grandTotal.toFixed(2);
            countBadge.innerText = totalItems;

            // ── sync mobile panel ───────────────────────────────
            if (_mc) _mc.innerHTML = cartHTML;
            if (_mb) _mb.innerText = totalItems;
            if (_mt) _mt.innerText = totalDisplay.innerText;

            calculateChange();
        }

        window.adjustQty = function(index, change) {
            let item = cart[index];
            if (change === 1) {
                if (item.qty + 1 > item.stock) {
                    alert("Max stock reached.");
                    return;
                }
                item.qty++;
            } else {
                item.qty--;
            }
            if (item.qty <= 0) cart.splice(index, 1);
            updateCartUI();
        }

        // --- CALCULATE CHANGE FUNCTION ---
        window.calculateChange = function() {
            const amountPaidInput = document.getElementById('amountPaidInput');
            const changeDisplay   = document.getElementById('changeDisplay');
            const _mcd            = document.getElementById('mobileChangeDisplay');

            const total  = cart.reduce((sum, item) => sum + item.price * item.qty, 0);
            const paid   = parseFloat(amountPaidInput.value) || 0;
            const change = paid - total;

            let text, cls;
            if (cart.length > 0 && paid > 0) {
                if (change < 0) {
                    text = "Insufficient";          cls = "fw-bold fs-4 text-danger";
                } else {
                    text = "₱" + change.toFixed(2); cls = "fw-bold fs-4 text-success";
                }
            } else {
                text = "₱0.00"; cls = "fw-bold fs-4 text-muted";
            }

            changeDisplay.innerText = text;
            changeDisplay.className = cls;
            if (_mcd) { _mcd.innerText = text; _mcd.className = cls; }
        }

        // Sanitize: only digits and a single dot are allowed in the amount field
        function sanitiseAmountField(input) {
            let val = input.value.replace(/[^0-9.]/g, '');
            const firstDot = val.indexOf('.');
            if (firstDot !== -1) val = val.slice(0, firstDot + 1) + val.slice(firstDot + 1).replace(/\./g, '');
            if (input.value !== val) input.value = val;
            return val;
        }

        document.getElementById('amountPaidInput').addEventListener('input', (e) => {
            const val = sanitiseAmountField(e.target);
            const _ma = document.getElementById('mobileAmountPaid');
            if (_ma) _ma.value = val;
            calculateChange();
        });

        // --- 4. ACTION BUTTONS ---
        window.clearCart = function() {
            if(confirm("Clear current order?")) {
                cart = [];
                document.getElementById('amountPaidInput').value = "";
                const _ma = document.getElementById('mobileAmountPaid');
                if (_ma) _ma.value = "";
                updateCartUI();
            }
        }

        window.checkStock = function() {
            if(confirm("Go to Inventory Management? Current order will be lost.")) {
                window.location.href = 'inventory.html?from=view';
            }
        }

        // --- SCROLL FUNCTION ---
        window.scrollCategories = function(amount) {
            const container = document.getElementById('catScrollContainer');
            container.scrollLeft += amount;
        }

        window.filterCategory = function(cat) {
            document.querySelectorAll('.cat-btn').forEach(btn => {
                if(btn.innerText.includes(cat) || (cat === 'All' && btn.innerText.includes('All'))) {
                    btn.classList.remove('btn-outline-dark'); btn.classList.add('btn-dark');
                } else {
                    btn.classList.add('btn-outline-dark'); btn.classList.remove('btn-dark');
                }
            });

            if(cat === 'All') renderProducts(allProducts);
            else renderProducts(allProducts.filter(p => p.category === cat));
        }

        window.toggleSearch = function() {
            const searchBar = document.getElementById('search-bar-container');
            const mnavBtn = document.getElementById('mnavSearch');
            const isHidden = searchBar.classList.contains('d-none');
            searchBar.classList.toggle('d-none', !isHidden);
            if (mnavBtn) mnavBtn.classList.toggle('active', isHidden);
            if (!isHidden) {
                document.getElementById('searchInput').value = '';
                renderProducts(allProducts);
            } else {
                document.getElementById('searchInput').focus();
            }
        }

        // wire up Close button
        document.getElementById('btnCloseSearch').addEventListener('click', toggleSearch);

        document.getElementById('searchInput').addEventListener('input', (e) => {
            let text = e.target.value.toLowerCase();
            renderProducts(allProducts.filter(p => p.name.toLowerCase().includes(text)));
        });

        // --- 5. PAYMENT (FEFO) ---
        document.getElementById('btnPay').addEventListener('click', async () => {
            if (cart.length === 0) return alert("Cart is empty!");
            
            let total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);

            // ── Amount-paid validation ──────────────────────────────────────
            const amountInput = document.getElementById('amountPaidInput');
            const rawPaid = amountInput.value.trim();

            if (!rawPaid) {
                alert("Please enter the amount paid before proceeding.");
                amountInput.focus();
                return;
            }
            let paid = parseFloat(rawPaid);
            if (isNaN(paid) || paid <= 0) {
                alert("Please enter a valid amount paid (numbers and '.' only).");
                amountInput.focus();
                amountInput.select();
                return;
            }
            if (paid < total) {
                alert(`Insufficient payment.\n\nAmount Paid : ₱${paid.toFixed(2)}\nTotal Due   : ₱${total.toFixed(2)}\n\nPlease enter an amount equal to or greater than the total.`);
                amountInput.focus(); amountInput.select();
                return;
            }

            const change = paid - total;
            // ───────────────────────────────────────────────────────────────

            if (!confirm(`Confirm Payment\n\nTotal  : ₱${total.toFixed(2)}\nCash   : ₱${paid.toFixed(2)}\nChange : ₱${change.toFixed(2)}`)) return;

            document.getElementById('btnPay').innerText = "Processing...";
            document.getElementById('btnPay').disabled = true;

            try {
                let soldItemsLog = [];

                for (let cartItem of cart) {
                    const productRef = doc(db, "products", cartItem.id);
                    const productSnap = await getDoc(productRef);
                    
                    if (productSnap.exists()) {
                        let productData = productSnap.data();
                        let batches = productData.batches || [];
                        let quantityToDeduct = cartItem.qty;

                        if(batches.length === 0 && productData.stock > 0) {
                            batches.push({
                                qty: productData.stock,
                                expiry: productData.expirationDate,
                                cost: productData.supplyPrice || 0
                            });
                        }

                        batches.sort((a, b) => new Date(a.expiry) - new Date(b.expiry));

                        for (const batch of batches) {
                            if (quantityToDeduct <= 0) break;
                            const taken = Math.min(batch.qty, quantityToDeduct);
                            batch.qty -= taken;
                            quantityToDeduct -= taken;
                            if (taken > 0) {
                                soldItemsLog.push(...Array(taken).fill(`${productData.name} (Exp: ${batch.expiry})`));
                            }
                        }

                        let newTotalStock = batches.reduce((sum, b) => sum + b.qty, 0);
                        let activeBatches = batches.filter(b => b.qty > 0);
                        activeBatches.sort((a, b) => new Date(a.expiry) - new Date(b.expiry));
                        let newNearestExpiry = activeBatches.length > 0 ? activeBatches[0].expiry : "N/A";

                        await updateDoc(productRef, {
                            stock: newTotalStock,
                            batches: batches,
                            expirationDate: newNearestExpiry
                        });
                    }
                }

                await addDoc(collection(db, "sales"), {
                    customer: currentCustomer,
                    items: soldItemsLog,
                    total: total,
                    amountPaid: paid,
                    change: parseFloat((paid - total).toFixed(2)),
                    date: new Date()
                });

                alert("Transaction Success!");
                cart = [];
                document.getElementById('amountPaidInput').value = "";
                const _ma2 = document.getElementById('mobileAmountPaid');
                if (_ma2) _ma2.value = "";
                updateCartUI();

            } catch (error) {
                console.error(error);
                alert("Error: " + error.message);
            } finally {
                document.getElementById('btnPay').innerText = "PAYMENT";
                document.getElementById('btnPay').disabled = false;
            }
        });

        // --- 6. NAVIGATION LOGIC (Back Button & Esc Key) ---
        function handleExit() {
            if (cart.length > 0) {
                if(confirm("Return to Home? Current order will be discarded.")) {
                    window.location.href = 'home.html';
                }
            } else {
                window.location.href = 'home.html';
            }
        }

        document.getElementById('btnBack').addEventListener('click', (e) => { e.preventDefault(); handleExit(); });

        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") {
                handleExit();
            }
            // Enter key triggers payment
            // Ignored when the search input is focused so search still works normally
            if (e.key === "Enter" && window.innerWidth >= 768) {
                const active = document.activeElement;
                if (active && active.id === 'searchInput') return;
                e.preventDefault();
                document.getElementById('btnPay').click();
            }
        });

    </script>

    <!-- ── Mobile Order Panel (hidden on md+) ─────────────────────────────── -->
    <div class="sismo-slide-panel d-md-none">
        <div class="sismo-slide-panel-header bg-dark text-white" onclick="toggleMobileOrder()">
            <span>ORDER LIST</span>
            <div class="d-flex align-items-center gap-2">
                <span id="mobile-item-count" class="badge bg-danger">0</span>
                <i id="mobileOrderArrow" class="bi bi-chevron-up sismo-slide-panel-arrow"></i>
            </div>
        </div>
        <div id="mobileOrderBody" class="sismo-slide-panel-body" style="display:flex;flex-direction:column;">
            <!-- Cart items: grows to fill available space, scrolls when full -->
            <div id="mobileCartContainer" style="flex:1 1 auto;overflow-y:auto;min-height:0;">
                <div class="text-center text-muted p-4">
                    <i class="bi bi-basket display-4"></i>
                    <p class="mt-2 mb-0">No Items Yet</p>
                </div>
            </div>
            <!-- Payment section: always stays at the bottom, never shrinks -->
            <div class="p-3 border-top bg-light" style="flex-shrink:0;">
                <div class="d-flex justify-content-between mb-2">
                    <span class="fw-bold">TOTAL:</span>
                    <span class="fw-bold text-danger fs-5" id="mobileTotalDisplay">&#8369;0.00</span>
                </div>
                <div class="input-group mb-2">
                    <span class="input-group-text bg-white"><i class="bi bi-cash"></i></span>
                    <input type="text" inputmode="decimal" id="mobileAmountPaid" class="form-control fw-bold text-end" placeholder="Cash" autocomplete="off">
                </div>
                <div class="d-flex justify-content-between px-1 mb-3">
                    <span class="small fw-bold text-muted">CHANGE:</span>
                    <span class="fw-bold text-success" id="mobileChangeDisplay">&#8369;0.00</span>
                </div>
                <button id="mobileBtnPay" class="btn btn-primary w-100 fw-bold py-3 fs-5">PAYMENT</button>
            </div>
        </div>
    </div>

    <!-- ── Mobile Bottom Nav host ─────────────────────────────────────────── -->
    <div id="mobile-bottom-nav-host"></div>

    <script>
        // ── Mobile Order Panel Toggle ──────────────────────────
        // Wrap the raw toggle so the palette button follows the panel
        // smoothly during its CSS max-height transition (350ms).
        const _rawToggleOrder = makeSlidePanelToggle('mobileOrderBody', 'mobileOrderArrow', null, false);

        function syncPaletteView() {
            const panel = document.querySelector('.sismo-slide-panel.d-md-none');
            const btn   = document.getElementById('palette-btn');
            if (!panel || !btn) return;
            if (window.innerWidth >= 768) {
                btn.style.setProperty('bottom', '30px'); // restore to 30px on desktop
                return;
            }
            btn.style.setProperty('bottom', (64 + panel.offsetHeight + 8) + 'px', 'important');
        }

        function toggleMobileOrder() {
            _rawToggleOrder();
            // Chase the panel for 420ms (transition is 350ms)
            const end = performance.now() + 420;
            (function frame() {
                syncPaletteView();
                if (performance.now() < end) requestAnimationFrame(frame);
                else syncPaletteView();
            })();
        }

        // ── Mobile amount paid → sync desktop & recalc ────────
        document.getElementById('mobileAmountPaid').addEventListener('input', (e) => {
            // Sanitize mobile input the same way as desktop
            let val = e.target.value.replace(/[^0-9.]/g, '');
            const firstDot = val.indexOf('.');
            if (firstDot !== -1) val = val.slice(0, firstDot + 1) + val.slice(firstDot + 1).replace(/\./g, '');
            if (e.target.value !== val) e.target.value = val;
            document.getElementById('amountPaidInput').value = val;
            calculateChange();
        });

        // ── Mobile Pay button → delegate to desktop btnPay ────
        document.getElementById('mobileBtnPay').addEventListener('click', () => {
            document.getElementById('amountPaidInput').value =
                document.getElementById('mobileAmountPaid').value;
            document.getElementById('btnPay').click();
        });

        // ── Render mobile bottom nav ──────────────────────────
        renderMobileBottomNav([
            { icon: 'bi-search',   label: 'Search', id: 'mnavSearch', onclick: 'toggleSearch()' },
            { icon: 'bi-x-circle', label: 'Clear',  id: 'mnavClear',  onclick: 'clearCart()' },
            { icon: 'bi-box-seam', label: 'Stock',  id: 'mnavStock',  onclick: 'checkStock()' }
        ]);

        // Initial palette position (panel starts collapsed but header is still visible)
        setTimeout(syncPaletteView, 120);
        window.addEventListener('resize', syncPaletteView);
    </script>

    <button id="palette-btn" class="btn btn-dark shadow" onclick="document.getElementById('bgPicker').click()" style="position: fixed; bottom: 30px; right: 30px; width: 50px; height: 50px; border-radius: 50%; z-index: 9999;" title="Change Background">
        <i class="bi bi-palette-fill"></i>
    </button>
    <input type="color" id="bgPicker" style="visibility: hidden; position: fixed; bottom: 30px; right: 30px;">

    <script>
        const picker = document.getElementById('bgPicker');
        const savedColor = localStorage.getItem('sismo_bg_color');
        if (savedColor) {
            applyBgColor(savedColor);
            picker.value = savedColor;
        }
        picker.addEventListener('input', (e) => {
            const color = e.target.value;
            applyBgColor(color);
            localStorage.setItem('sismo_bg_color', color);
        });
    </script>
</body>
</html>
