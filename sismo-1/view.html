<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAR-XPERT - Point of Sale</title>
    <link rel="icon" href="assets/img/logo.jpg" type="image/jpeg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/view.css">
    <script src="assets/js/components.js?v=2"></script>

    <style>
        @media (max-width: 767.98px) { .product-area { padding-bottom: 180px; } }
        .text-brand { color: #dc3545 !important; }
        .bg-brand   { background-color: #dc3545 !important; color: white; }

        .cond-badge { font-size: .6rem; font-weight: 700; padding: 1px 5px; border-radius: 3px; letter-spacing: .3px; }
        .cond-badge.new     { background:#d1e7dd; color:#0f5132; }
        .cond-badge.surplus { background:#ffe5d0; color:#7d3900; }
        .card-compat-tag { display: inline-block; font-size:.58rem; background:#fff3cd; color:#664d03; border:1px solid #ffc107; border-radius:3px; padding:0 4px; margin:1px 1px 0 0; line-height:1.5; }

        /* ── RECEIPT PRINT STYLES ── */
        @media print {
            body * { visibility: hidden; }
            #printReceipt, #printReceipt * { visibility: visible; }
            #printReceipt { position: absolute; left: 0; top: 0; width: 80mm; padding: 0; margin: 0; color: #000; font-family: 'Courier New', Courier, monospace; }
        }
    </style>
</head>
<body>

    <div id="sismo-guard" style="position:fixed;inset:0;background:#fff;z-index:99999;display:flex;align-items:center;justify-content:center;">
        <div class="spinner-border text-danger" role="status"></div>
    </div>

    <script type="module">
        import { getApps, initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        const _cfg = {
            apiKey: "AIzaSyD81sF9ClxA_HKRaEkmCSyHXXRCHR1efkk",
            authDomain: "car-xpert-76d1b.firebaseapp.com",
            projectId: "car-xpert-76d1b",
            storageBucket: "car-xpert-76d1b.firebasestorage.app",
            messagingSenderId: "180376885101",
            appId: "1:180376885101:web:0cdfffab3fe965e1722c64",
            measurementId: "G-7E0D6YT43R"
        };
        const _app = getApps().length ? getApps()[0] : initializeApp(_cfg);
        onAuthStateChanged(getAuth(_app), user => {
            if (!user) { window.location.replace('index.html'); return; }
            document.getElementById('sismo-guard').remove();
        });
        window._sismoSignOut = async () => { await signOut(getAuth(_app)); window.location.replace('index.html'); };
    </script>

    <div id="page-header"></div>
    <script>
        renderPageHeader({
            badge: 'Point of Sale',
            rightHtml: backButtonHtml({ label: 'Back to Home', mobileLabel: 'Home', href: 'home.html' }),
            containerClass: 'container-fluid px-3 pt-2 pb-1 mb-1'
        });
    </script>

    <div id="search-bar-container" class="d-none border-bottom bg-white px-3 py-2">
        <div class="input-group">
            <span class="input-group-text"><i class="bi bi-upc-scan text-primary fw-bold"></i></span>
            <input type="text" id="searchInput" class="form-control"
                   placeholder="Click here and scan barcode, or search by name...">
            <button class="btn btn-outline-secondary" id="btnCloseSearch">Close</button>
        </div>
        <div class="d-flex gap-2 mt-2 align-items-center">
            <small class="text-muted">Filter:</small>
            <span class="badge bg-dark search-cond-pill" id="spillAll"    style="cursor:pointer;" onclick="setPosCondFilter('All')">All</span>
            <span class="badge bg-success search-cond-pill" id="spillNew" style="cursor:pointer;opacity:.5;" onclick="setPosCondFilter('Brand New')">🟢 Brand New</span>
            <span class="badge search-cond-pill" id="spillSurplus" style="cursor:pointer;background:#fd7e14;opacity:.5;" onclick="setPosCondFilter('Surplus')">🟠 Surplus</span>
        </div>
    </div>

    <div class="container-fluid px-1 pt-0 pb-3 pos-wrapper">
        <div class="row g-0 pos-container">

            <div class="col-md-3 order-list-panel d-none d-md-flex flex-column">
                <div class="p-3 bg-dark text-white fw-bold d-flex justify-content-between align-items-center">
                    <span>ORDER LIST</span>
                    <span id="item-count-badge" class="badge bg-danger">0</span>
                </div>

                <div class="order-items flex-grow-1" id="cartContainer" style="overflow-y:auto;">
                    <div class="text-center text-muted mt-5">
                        <i class="bi bi-basket display-4"></i>
                        <p class="mt-2">No Items Yet</p>
                    </div>
                </div>

                <div class="order-total-section p-3 border-top bg-light">
                    <div class="d-flex justify-content-between mb-2">
                        <span class="fw-bold fs-5">TOTAL AMOUNT:</span>
                        <span class="fw-bold text-danger fs-4" id="totalPriceDisplay">₱0.00</span>
                    </div>
                    <div class="mb-3">
                        <div class="input-group mb-2">
                            <span class="input-group-text fw-bold bg-white"><i class="bi bi-cash"></i></span>
                            <input type="text" inputmode="decimal" id="amountPaidInput"
                                   class="form-control fw-bold fs-5 text-end" placeholder="0.00" autocomplete="off">
                        </div>
                        <div class="d-flex justify-content-between align-items-center px-1">
                            <span class="small fw-bold text-muted">CHANGE:</span>
                            <span class="fw-bold fs-4 text-success" id="changeDisplay">₱0.00</span>
                        </div>
                    </div>
                    <button id="btnPay" class="btn btn-danger w-100 fw-bold py-3 fs-5 shadow-sm">PAYMENT</button>
                </div>
            </div>

            <div class="col-md-7 product-area">
                <div class="category-wrapper">
                    <button class="scroll-arrow left" onclick="scrollCategories(-200)"><i class="bi bi-chevron-left"></i></button>
                    <div class="category-scroll" id="catScrollContainer">
                        <button class="btn btn-dark cat-btn"         onclick="filterCategory('All')">All Parts</button>
                        <button class="btn btn-outline-dark cat-btn" onclick="filterCategory('Engine Parts')">Engine Parts</button>
                        <button class="btn btn-outline-dark cat-btn" onclick="filterCategory('Fluids & Oils')">Fluids & Oils</button>
                        <button class="btn btn-outline-dark cat-btn" onclick="filterCategory('Brakes & Suspension')">Brakes & Suspension</button>
                        <button class="btn btn-outline-dark cat-btn" onclick="filterCategory('Electrical')">Electrical</button>
                        <button class="btn btn-outline-dark cat-btn" onclick="filterCategory('Accessories')">Accessories</button>
                        <button class="btn btn-outline-dark cat-btn" onclick="filterCategory('Tools')">Tools</button>
                        <button class="btn btn-outline-dark cat-btn" onclick="filterCategory('Others')">Others</button>
                    </div>
                    <button class="scroll-arrow right" onclick="scrollCategories(200)"><i class="bi bi-chevron-right"></i></button>
                </div>

                <h5 class="mb-3 text-muted" id="grid-title">Select Parts</h5>
                <div class="row g-2" id="productGrid">
                    <div class="text-center py-5">
                        <div class="spinner-border text-danger"></div>
                        <p>Loading Inventory…</p>
                    </div>
                </div>
            </div>

            <div class="col-md-2 action-panel d-none d-md-flex flex-column">
                <button class="btn btn-light action-btn text-primary border-primary border-2 fw-bold" onclick="toggleSearch()">
                    <i class="bi bi-upc-scan"></i> SCAN / SEARCH
                </button>
                <button class="btn btn-light action-btn text-danger" onclick="clearCart()">
                    <i class="bi bi-x-circle"></i> CLEAR
                </button>
                <button class="btn btn-light action-btn" onclick="checkStock()">
                    <i class="bi bi-box-seam"></i> STOCK
                </button>
            </div>
        </div>
    </div>

    <div id="printReceipt" class="d-none"></div>

    <script type="module">
        import { getApps, initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import {
            getFirestore, collection, onSnapshot,
            addDoc, doc, getDoc, updateDoc
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const app = getApps()[0];
        const db  = getFirestore(app);

        let allProducts        = [];
        let cart               = [];
        let currentCustomer    = "Walk-in";
        let posCondFilter      = "All";          
        let activeCategoryFilter = "All";

        const TRUCK_MAP = {
            'isuzu elf':         ['4hf1','4hg1','4he1','4jb1','4bc2','4be1','4bd1'],
            'isuzu forward':     ['6hh1','6hk1','6sd1','6bg1'],
            'fuso canter':       ['4d32','4d33','4d34','4d35','4m50'],
            'hino ranger':       ['j08c','j08e','ef750','fd','fe6']
        };

        function smartMatch(item, rawQuery) {
            if (!rawQuery) return true;
            const q = rawQuery.toLowerCase().trim();
            const expanded = new Set([q]);
            for (const [model, engines] of Object.entries(TRUCK_MAP)) {
                if (model.includes(q) || q.includes(model)) engines.forEach(e => expanded.add(e));
                if (engines.some(e => e === q)) expanded.add(model);
            }
            const hay = [
                item.name || '', item.oem || '', item.barcode || '', item.category || '', item.condition || '',
                ...(item.compatTags || [])
            ].join(' ').toLowerCase();
            return [...expanded].some(t => hay.includes(t));
        }

        window.setPosCondFilter = function(cond) {
            posCondFilter = cond;
            ['spillAll','spillNew','spillSurplus'].forEach(id => document.getElementById(id).style.opacity = '0.45');
            const map = { 'All':'spillAll', 'Brand New':'spillNew', 'Surplus':'spillSurplus' };
            document.getElementById(map[cond]).style.opacity = '1';
            applyPosFilters();
        };

        const productGrid = document.getElementById('productGrid');

        onSnapshot(collection(db, "products"), (snapshot) => {
            allProducts = [];
            snapshot.forEach((d) => {
                let p = d.data();
                p.id = d.id;
                if (!p.compatTags) p.compatTags = (p.compat || '').split(',').map(t => t.trim()).filter(Boolean);
                allProducts.push(p);
            });
            applyPosFilters();
        });

        function applyPosFilters() {
            const searchText = (document.getElementById('searchInput')?.value || '').trim();
            let results = allProducts;
            if (activeCategoryFilter !== 'All') results = results.filter(p => p.category === activeCategoryFilter);
            if (posCondFilter !== 'All') results = results.filter(p => (p.condition || 'Brand New') === posCondFilter);
            if (searchText) results = results.filter(p => smartMatch(p, searchText));
            renderProducts(results);
        }

        window.renderProducts = function(productsToRender) {
            productGrid.innerHTML = "";
            if (productsToRender.length === 0) {
                productGrid.innerHTML = '<p class="text-center text-muted py-4">No parts found.</p>';
                return;
            }

            productsToRender.forEach(p => {
                const outOfStock = p.stock <= 0;
                const cardClass  = 'product-card' + (outOfStock ? ' disabled' : '');
                const clickAct   = outOfStock ? '' : `addToCart('${p.id}')`;
                const statusText = outOfStock ? 'Out of Stock' : `${p.stock} in stock`;
                const statusCls  = outOfStock ? 'text-danger fw-bold' : 'text-success';

                const imgSrc = p.image || "https://placehold.co/150x120?text=No+Image";
                const isSurplus  = (p.condition === 'Surplus');
                const condBadge  = `<span class="cond-badge ${isSurplus ? 'surplus' : 'new'}">${isSurplus ? '🟠 Surplus' : '🟢 New'}</span>`;
                const tags = (p.compatTags || []).slice(0, 3).map(t => `<span class="card-compat-tag">${t}</span>`).join('');
                
                // Show a little barcode icon if it has a barcode assigned
                const codeIcon = p.barcode ? `<i class="bi bi-upc text-muted" title="Has Barcode"></i>` : '';

                productGrid.innerHTML += `
                <div class="col-4 col-lg-3">
                    <div class="card ${cardClass} p-2 text-center" onclick="${clickAct}">
                        <div class="card-body p-1 d-flex flex-column h-100">
                            <img src="${imgSrc}" class="product-card-img" alt="${p.name}">
                            <div class="mb-1">${condBadge}</div>
                            <div class="product-title" title="${p.name}">${codeIcon} ${p.name}</div>
                            ${tags ? `<div class="mb-1">${tags}</div>` : ''}
                            <div class="mt-auto">
                                <small class="text-danger fw-bold d-block">₱${(p.price || 0).toFixed(2)}</small>
                                <small class="${statusCls} small">${statusText}</small>
                            </div>
                        </div>
                    </div>
                </div>`;
            });
        };

        window.addToCart = function(id) {
            const product = allProducts.find(p => p.id === id);
            const existing = cart.find(i => i.id === id);

            if (existing) {
                if (existing.qty + 1 > product.stock) { alert("Not enough stock!"); return; }
                existing.qty++;
            } else {
                cart.push({
                    id:        product.id,
                    name:      product.name,
                    price:     product.price || 0,     
                    stock:     product.stock,
                    image:     product.image,
                    condition: product.condition || 'Brand New',
                    qty:       1,
                    _product:  product              
                });
            }
            updateCartUI();
        };

        function updateCartUI() {
            const container    = document.getElementById('cartContainer');
            const totalDisplay = document.getElementById('totalPriceDisplay');
            const countBadge   = document.getElementById('item-count-badge');
            const _mc = document.getElementById('mobileCartContainer');
            const _mb = document.getElementById('mobile-item-count');
            const _mt = document.getElementById('mobileTotalDisplay');

            if (cart.length === 0) {
                const emptyHTML = `<div class="text-center text-muted mt-5"><i class="bi bi-basket display-4"></i><p class="mt-2">No Items Yet</p></div>`;
                container.innerHTML = emptyHTML;
                totalDisplay.innerText = "₱0.00";
                countBadge.innerText = "0";
                if (_mc) _mc.innerHTML = emptyHTML; if (_mb) _mb.innerText = '0'; if (_mt) _mt.innerText = '₱0.00';
                calculateChange(); return;
            }

            let grandTotal = 0, totalItems = 0;
            const rows = cart.map((item, index) => {
                const itemTotal = item.price * item.qty;
                grandTotal += itemTotal; totalItems += item.qty;
                const thumb = item.image || "https://placehold.co/50?text=?";
                return `<div class="p-2 border-bottom bg-white mb-1"><div class="d-flex align-items-center"><img src="${thumb}" class="rounded me-2 shadow-sm" style="width:50px;height:50px;object-fit:cover;"><div class="flex-grow-1"><div class="d-flex justify-content-between align-items-start"><span class="fw-bold text-truncate" style="max-width:120px;" title="${item.name}">${item.name}</span><span class="fw-bold text-danger">₱${itemTotal.toFixed(2)}</span></div><div class="d-flex justify-content-between align-items-center mt-1"><small class="text-muted" style="font-size:.8rem;">₱${item.price.toFixed(2)} x ${item.qty}</small><div><button class="btn btn-sm btn-outline-danger py-0 px-2" onclick="adjustQty(${index},-1)">-</button><button class="btn btn-sm btn-outline-success py-0 px-2" onclick="adjustQty(${index},1)">+</button></div></div></div></div></div>`;
            });

            container.innerHTML = rows.join('');
            totalDisplay.innerText = "₱" + grandTotal.toFixed(2);
            countBadge.innerText = totalItems;
            if (_mc) _mc.innerHTML = rows.join(''); if (_mb) _mb.innerText = totalItems; if (_mt) _mt.innerText = totalDisplay.innerText;
            calculateChange();
        }

        window.adjustQty = function(index, change) {
            const item = cart[index];
            if (change === 1) {
                if (item.qty + 1 > item.stock) { alert("Max stock reached."); return; }
                item.qty++;
            } else { item.qty--; }
            if (item.qty <= 0) cart.splice(index, 1);
            updateCartUI();
        };

        window.calculateChange = function() {
            const amountPaidInput = document.getElementById('amountPaidInput');
            const changeDisplay   = document.getElementById('changeDisplay');
            const total  = cart.reduce((sum, i) => sum + i.price * i.qty, 0);
            const paid   = parseFloat(amountPaidInput.value) || 0;
            const change = paid - total;

            let text, cls;
            if (cart.length > 0 && paid > 0) {
                text = change < 0 ? "Insufficient" : "₱" + change.toFixed(2);
                cls  = `fw-bold fs-4 ${change < 0 ? 'text-danger' : 'text-success'}`;
            } else { text = "₱0.00"; cls = "fw-bold fs-4 text-muted"; }
            changeDisplay.innerText = text; changeDisplay.className = cls;
            
            const _mcd = document.getElementById('mobileChangeDisplay');
            if (_mcd) { _mcd.innerText = text; _mcd.className = cls; }
        };

        document.getElementById('amountPaidInput').addEventListener('input', (e) => {
            let val = e.target.value.replace(/[^0-9.]/g, '');
            const fd = val.indexOf('.');
            if (fd !== -1) val = val.slice(0, fd + 1) + val.slice(fd + 1).replace(/\./g, '');
            if (e.target.value !== val) e.target.value = val;
            const _ma = document.getElementById('mobileAmountPaid');
            if (_ma) _ma.value = val;
            calculateChange();
        });

        window.clearCart = function() {
            if (confirm("Clear current order?")) {
                cart = [];
                document.getElementById('amountPaidInput').value = "";
                const _ma = document.getElementById('mobileAmountPaid');
                if (_ma) _ma.value = "";
                updateCartUI();
            }
        };

        window.checkStock = function() {
            if (confirm("Go to Inventory? Current order will be lost.")) window.location.href = 'inventory.html?from=view';
        };

        window.scrollCategories = function(amount) { document.getElementById('catScrollContainer').scrollLeft += amount; };

        window.filterCategory = function(cat) {
            activeCategoryFilter = cat;
            document.querySelectorAll('.cat-btn').forEach(btn => {
                const isActive = btn.innerText.includes(cat) || (cat === 'All' && btn.innerText.includes('All'));
                btn.classList.toggle('btn-dark', isActive);
                btn.classList.toggle('btn-outline-dark', !isActive);
            });
            applyPosFilters();
        };

        window.toggleSearch = function() {
            const bar = document.getElementById('search-bar-container');
            const mnavBtn = document.getElementById('mnavSearch');
            const isHidden = bar.classList.contains('d-none');
            bar.classList.toggle('d-none', !isHidden);
            if (mnavBtn) mnavBtn.classList.toggle('active', isHidden);
            if (!isHidden) {
                document.getElementById('searchInput').value = '';
                applyPosFilters();
                document.getElementById('searchInput').focus(); // Ready for scanner!
            }
        };

        document.getElementById('btnCloseSearch').addEventListener('click', toggleSearch);

        // ★ BARCODE SCANNER LOGIC (Listens for the Enter key)
        const searchInput = document.getElementById('searchInput');
        
        searchInput.addEventListener('input', applyPosFilters); // Visual filter as you type
        
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault(); // Stop normal Enter key behavior
                const query = e.target.value.trim();
                if (!query) return;

                // 1. Check if the scanned number perfectly matches a saved barcode
                const exactMatch = allProducts.find(p => p.barcode && p.barcode === query);
                
                if (exactMatch) {
                    addToCart(exactMatch.id);
                    e.target.value = ''; // Clear the box for the next scan
                    applyPosFilters();   // Reset the visual grid
                } else {
                    // Fallback: If it's not a barcode, maybe they typed an OEM perfectly
                    const fallbackMatch = allProducts.find(p => p.oem === query);
                    if (fallbackMatch) {
                        addToCart(fallbackMatch.id);
                        e.target.value = '';
                        applyPosFilters();
                    } else {
                        // Play a little visual error trick if item isn't found
                        e.target.classList.add('is-invalid');
                        setTimeout(() => e.target.classList.remove('is-invalid'), 1000);
                        e.target.select(); 
                    }
                }
            }
        });

        // ══════════════════════════════════════════════════════
        // 5. PAYMENT & RECEIPT PRINTING
        // ══════════════════════════════════════════════════════
        document.getElementById('btnPay').addEventListener('click', async () => {
            if (cart.length === 0) return alert("Cart is empty!");

            const total = cart.reduce((sum, i) => sum + i.price * i.qty, 0);
            const amountInput = document.getElementById('amountPaidInput');
            const rawPaid = amountInput.value.trim();

            if (!rawPaid) { alert("Please enter the amount paid."); amountInput.focus(); return; }
            const paid = parseFloat(rawPaid);
            if (isNaN(paid) || paid <= 0) { alert("Enter a valid amount."); amountInput.focus(); return; }
            if (paid < total) { alert(`Insufficient payment.\n\nTotal Due: ₱${total.toFixed(2)}`); amountInput.focus(); return; }

            const change = paid - total;
            const btnPay = document.getElementById('btnPay');
            btnPay.innerText = "Processing…"; btnPay.disabled = true;

            try {
                const soldItemsLog = [];

                for (const cartItem of cart) {
                    const productRef  = doc(db, "products", cartItem.id);
                    const productSnap = await getDoc(productRef);
                    if (!productSnap.exists()) continue;

                    const currentStock  = productSnap.data().stock || 0;
                    const newStock      = Math.max(0, currentStock - cartItem.qty);
                    await updateDoc(productRef, { stock: newStock });

                    soldItemsLog.push({
                        productId:  cartItem.id,
                        name:       cartItem.name,
                        condition:  cartItem.condition,
                        unitPrice:  cartItem.price,
                        qty:        cartItem.qty,
                        lineTotal:  parseFloat((cartItem.price * cartItem.qty).toFixed(2))
                    });
                }

                await addDoc(collection(db, "sales"), {
                    customer:   currentCustomer,
                    items:      soldItemsLog,
                    total,
                    amountPaid: paid,
                    change:     parseFloat(change.toFixed(2)),
                    date:       new Date()
                });

                // ── BUILD AND PRINT THE RECEIPT ──
                let receiptHTML = `
                    <div style="text-align: center; margin-bottom: 10px;">
                        <h3 style="margin: 0; font-weight: bold; font-family: sans-serif;">CAR-XPERT</h3>
                        <p style="margin: 0; font-size: 12px;">Truck Parts & Surplus</p>
                        <p style="margin: 0; font-size: 12px;">${new Date().toLocaleString()}</p>
                        <hr style="border-top: 1px dashed black; margin: 8px 0;">
                    </div>
                    <table style="width: 100%; font-size: 12px; margin-bottom: 10px;">
                        <tr><th style="text-align: left;">Item</th><th style="text-align: right;">Total</th></tr>
                `;

                soldItemsLog.forEach(item => {
                    receiptHTML += `
                        <tr>
                            <td style="padding-bottom: 4px;">${item.qty}x ${item.name}</td>
                            <td style="text-align: right; padding-bottom: 4px;">${item.lineTotal.toFixed(2)}</td>
                        </tr>
                    `;
                });

                receiptHTML += `
                    </table>
                    <hr style="border-top: 1px dashed black; margin: 8px 0;">
                    <div style="font-size: 14px; text-align: right;">
                        <p style="margin: 2px 0;"><strong>TOTAL: ₱${total.toFixed(2)}</strong></p>
                        <p style="margin: 2px 0;">CASH: ₱${paid.toFixed(2)}</p>
                        <p style="margin: 2px 0;">CHANGE: ₱${change.toFixed(2)}</p>
                    </div>
                    <div style="text-align: center; margin-top: 20px; font-size: 12px;">
                        <p style="margin: 0;">Thank you, Boss!</p>
                        <p style="margin: 0;">Please inspect parts before leaving.</p>
                        <br><br>
                    </div>
                `;

                const printDiv = document.getElementById('printReceipt');
                printDiv.innerHTML = receiptHTML;
                printDiv.classList.remove('d-none'); // Show for printing
                
                window.print(); // Trigger thermal printer / browser dialog

                printDiv.classList.add('d-none'); // Hide immediately after
                // ─────────────────────────────────

                cart = [];
                amountInput.value = "";
                const _ma2 = document.getElementById('mobileAmountPaid');
                if (_ma2) _ma2.value = "";
                updateCartUI();

            } catch (err) {
                console.error(err);
                alert("Error: " + err.message);
            } finally {
                btnPay.innerText = "PAYMENT"; btnPay.disabled = false;
            }
        });

        // ══════════════════════════════════════════════════════
        // 6. KEYBOARD & NAVIGATION
        // ══════════════════════════════════════════════════════
        function handleExit() {
            if (cart.length > 0) {
                if (confirm("Return to Home? Current order will be discarded.")) window.location.href = 'home.html';
            } else { window.location.href = 'home.html'; }
        }

        document.getElementById('btnBack').addEventListener('click', e => { e.preventDefault(); handleExit(); });

        document.addEventListener('keydown', e => {
            if (e.key === "Escape") handleExit();
            
            // Allow global Enter to trigger payment ONLY IF search bar is not being used
            if (e.key === "Enter" && window.innerWidth >= 768) {
                if (document.activeElement?.id === 'searchInput') return; // Let scanner use Enter!
                if (document.activeElement?.id === 'amountPaidInput') {
                    e.preventDefault();
                    document.getElementById('btnPay').click();
                }
            }
        });

    </script>

    <div class="sismo-slide-panel d-md-none">
        <div class="sismo-slide-panel-header bg-dark text-white" onclick="toggleMobileOrder()">
            <span>ORDER LIST</span>
            <div class="d-flex align-items-center gap-2">
                <span id="mobile-item-count" class="badge bg-danger">0</span>
                <i id="mobileOrderArrow" class="bi bi-chevron-up sismo-slide-panel-arrow"></i>
            </div>
        </div>
        <div id="mobileOrderBody" class="sismo-slide-panel-body" style="display:flex;flex-direction:column;">
            <div id="mobileCartContainer" style="flex:1 1 auto;overflow-y:auto;min-height:0;">
                <div class="text-center text-muted p-4">
                    <i class="bi bi-basket display-4"></i>
                    <p class="mt-2 mb-0">No Items Yet</p>
                </div>
            </div>
            <div class="p-3 border-top bg-light" style="flex-shrink:0;">
                <div class="d-flex justify-content-between mb-2">
                    <span class="fw-bold">TOTAL:</span>
                    <span class="fw-bold text-danger fs-5" id="mobileTotalDisplay">₱0.00</span>
                </div>
                <div class="input-group mb-2">
                    <span class="input-group-text bg-white"><i class="bi bi-cash"></i></span>
                    <input type="text" inputmode="decimal" id="mobileAmountPaid"
                           class="form-control fw-bold text-end" placeholder="Cash" autocomplete="off">
                </div>
                <div class="d-flex justify-content-between px-1 mb-3">
                    <span class="small fw-bold text-muted">CHANGE:</span>
                    <span class="fw-bold text-success" id="mobileChangeDisplay">₱0.00</span>
                </div>
                <button id="mobileBtnPay" class="btn btn-danger w-100 fw-bold py-3 fs-5">PAYMENT</button>
            </div>
        </div>
    </div>

    <div id="mobile-bottom-nav-host"></div>

    <script>
        const _rawToggleOrder = makeSlidePanelToggle('mobileOrderBody','mobileOrderArrow',null,false);

        function syncPaletteView() {
            const panel = document.querySelector('.sismo-slide-panel.d-md-none');
            const btn   = document.getElementById('palette-btn');
            if (!panel || !btn) return;
            if (window.innerWidth >= 768) { btn.style.setProperty('bottom','30px'); return; }
            btn.style.setProperty('bottom',(64 + panel.offsetHeight + 8) + 'px','important');
        }

        function toggleMobileOrder() {
            _rawToggleOrder();
            const end = performance.now() + 420;
            (function frame() {
                syncPaletteView();
                if (performance.now() < end) requestAnimationFrame(frame);
                else syncPaletteView();
            })();
        }

        document.getElementById('mobileAmountPaid').addEventListener('input', (e) => {
            let val = e.target.value.replace(/[^0-9.]/g,'');
            const fd = val.indexOf('.');
            if (fd !== -1) val = val.slice(0,fd+1)+val.slice(fd+1).replace(/\./g,'');
            if (e.target.value !== val) e.target.value = val;
            document.getElementById('amountPaidInput').value = val;
            calculateChange();
        });

        document.getElementById('mobileBtnPay').addEventListener('click', () => {
            document.getElementById('amountPaidInput').value = document.getElementById('mobileAmountPaid').value;
            document.getElementById('btnPay').click();
        });

        renderMobileBottomNav([
            { icon:'bi-upc-scan', label:'Scan', id:'mnavSearch', onclick:'toggleSearch()' },
            { icon:'bi-x-circle', label:'Clear',  id:'mnavClear',  onclick:'clearCart()' },
            { icon:'bi-box-seam', label:'Stock',  id:'mnavStock',  onclick:'checkStock()' }
        ]);

        setTimeout(syncPaletteView,120);
        window.addEventListener('resize',syncPaletteView);
    </script>

    <button id="palette-btn" class="btn btn-dark shadow" onclick="document.getElementById('bgPicker').click()" style="position:fixed;bottom:30px;right:30px;width:50px;height:50px;border-radius:50%;z-index:9999;" title="Change Background"><i class="bi bi-palette-fill"></i></button>
    <input type="color" id="bgPicker" style="visibility:hidden;position:fixed;bottom:30px;right:30px;">

    <script>
        const picker = document.getElementById('bgPicker');
        const savedColor = localStorage.getItem('carxpert_bg_color');
        if (savedColor) { applyBgColor(savedColor); picker.value = savedColor; }
        picker.addEventListener('input', e => { applyBgColor(e.target.value); localStorage.setItem('carxpert_bg_color', e.target.value); });
    </script>
</body>
</html>
