<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAR-XPERT | Login</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #d32f2f; margin-bottom: 0.5rem; font-weight: bold; }
        p { color: #666; margin-bottom: 2rem; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #d32f2f; }
        button { width: 100%; padding: 12px; background: #d32f2f; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; margin-top: 10px; }
        button:hover { background: #b71c1c; }
        #message { margin-top: 15px; font-size: 0.9rem; min-height: 20px; }
        .loader { color: #666; display: none; margin-top: 10px; }
    </style>
</head>
<body>

<div class="login-card">
    <h1>CAR-XPERT</h1>
    <p>Auto Supply Inventory System</p>
    
    <div id="login-ui">
        <input type="text" id="username" placeholder="Username (e.g. autosupply)">
        <input type="password" id="password" placeholder="Password">
        <button id="loginBtn" onclick="handleLogin()">Login to System</button>
    </div>

    <div id="loader" class="loader">Authenticating... Please wait.</div>
    <div id="message"></div>
</div>

<script>
    // 1. CAR-XPERT FIREBASE CONFIG
    const firebaseConfig = {
        apiKey: "AIzaSyD81sF9ClxA_HKRaEkmCSyHXXRCHR1efkk",
        authDomain: "car-xpert-76d1b.firebaseapp.com",
        projectId: "car-xpert-76d1b",
        storageBucket: "car-xpert-76d1b.firebasestorage.app",
        messagingSenderId: "180376885101",
        appId: "1:180376885101:web:0cdfffab3fe965e1722c64",
        measurementId: "G-7E0D6YT43R"
    };
    firebase.initializeApp(firebaseConfig);

    // 2. YOUR NEW EMAILJS KEYS
    const SERVICE_ID = "service_yjc1cgi"; 
    const TEMPLATE_ID = "template_d067t8g"; 
    const PUBLIC_KEY = "gS2Tda4tn4Y0PdgZ1";

    emailjs.init(PUBLIC_KEY);

    async function handleLogin() {
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value;
        const msg = document.getElementById('message');
        const loader = document.getElementById('loader');
        const loginUI = document.getElementById('login-ui');

        if (!user || !pass) {
            msg.style.color = "red";
            msg.innerText = "Please enter both fields.";
            return;
        }

        // Combine username with business domain
        const fullEmail = user.includes('@') ? user : user + "@carxpert.com"; 

        // UI Feedback
        msg.innerText = "";
        loginUI.style.display = "none";
        loader.style.display = "block";

        try {
            // FIREBASE AUTHENTICATION
            const userCredential = await firebase.auth().signInWithEmailAndPassword(fullEmail, pass);
            
            // EMAIL NOTIFICATION
            await emailjs.send(SERVICE_ID, TEMPLATE_ID, {
                user_name: user,
                login_time: new Date().toLocaleString(),
                system_name: "CAR-XPERT AUTO SUPPLY"
            });

            // REDIRECT TO HOME
            window.location.href = "home.html"; 

        } catch (error) {
            console.error(error);
            loginUI.style.display = "block";
            loader.style.display = "none";
            msg.style.color = "red";
            
            if (error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
                msg.innerText = "Invalid username or password.";
            } else {
                msg.innerText = "Error: " + error.message;
            }
        }
    }

    // Allow pressing "Enter" to login
    document.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            handleLogin();
        }
    });
</script>

</body>
</html>
