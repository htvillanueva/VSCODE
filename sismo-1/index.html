<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISMO - Login</title>
    <link rel="icon" href="assets/img/logo.svg" type="image/svg+xml">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/index.css">
    <script src="assets/js/components.js"></script>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          // Initialize with your Public Key
          emailjs.init("k9LMDyG74RrAVmd5R");
       })();
    </script>
</head>
<body>

    <div class="login-card text-center">
        <img src="assets/img/logo_label.png" alt="SISMO Logo" class="d-block mx-auto" style="width: 220px;">
        <p class="text-muted mb-4 small">Sari-sari Inventory System</p>
        <div id="login-form">
            <div class="mb-3 text-start">
                <label class="form-label fw-bold small text-secondary">Username</label>
                <input type="text" id="loginInput" class="form-control" placeholder="username">
            </div>

            <div class="mb-3 text-start">
                <label class="form-label fw-bold small text-secondary">Password</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••">
            </div>
            
            <button id="btn-login" class="btn btn-primary w-100 btn-lg py-2 mt-3 fw-bold">
                Login
            </button>
            
            <div class="mt-4 text-center">
                <small class="text-muted" style="font-size: 0.8rem;">Forgot Password? Contact Admin.</small>
            </div>
        </div>

        <div id="loader" class="d-none mt-4">
            <div class="spinner-border text-danger" role="status"></div>
            <p class="text-muted mt-2 small">Authenticating...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAlTpK3kiqIGXsYZHgmES6MBaepo_5_i6Q",
            authDomain: "sismo-5323c.firebaseapp.com",
            projectId: "sismo-5323c",
            storageBucket: "sismo-5323c.firebasestorage.app",
            messagingSenderId: "179304155395",
            appId: "1:179304155395:web:fa017fa581335f4f140136"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Redirect already-logged-in users straight to home,
        // but not during an active login attempt (emails need to send first)
        let _loggingIn = false;
        onAuthStateChanged(auth, user => { if (user && !_loggingIn) window.location.replace('home.html'); });

        const btnLogin = document.getElementById('btn-login');
        const loader = document.getElementById('loader');
        const loginForm = document.getElementById('login-form');

        // ── Enter key submits the form ────────────────────────────────────────
        ['loginInput', 'password'].forEach(id => {
            document.getElementById(id).addEventListener('keydown', e => {
                if (e.key === 'Enter') btnLogin.click();
            });
        });

        // ── Encrypt login state → cookie (Web Crypto AES-GCM + PBKDF2) ──────
        async function encryptAndSetLoginCookie(uid, email) {
            const enc      = new TextEncoder();
            const APP_SALT = 'sismo-app-v1';

            // Derive a 256-bit AES-GCM key from a fixed app salt + the user's UID
            const keyMaterial = await crypto.subtle.importKey(
                'raw', enc.encode(APP_SALT), 'PBKDF2', false, ['deriveKey']
            );
            const key = await crypto.subtle.deriveKey(
                { name: 'PBKDF2', salt: enc.encode(uid), iterations: 100000, hash: 'SHA-256' },
                keyMaterial,
                { name: 'AES-GCM', length: 256 },
                false,
                ['encrypt']
            );

            // Encrypt a JSON payload that carries the session identity
            const iv      = crypto.getRandomValues(new Uint8Array(12));
            const payload = enc.encode(JSON.stringify({ uid, email, ts: Date.now() }));
            const cipher  = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, payload);

            // Prepend IV so it can travel with the ciphertext
            const combined = new Uint8Array(iv.byteLength + cipher.byteLength);
            combined.set(iv, 0);
            combined.set(new Uint8Array(cipher), iv.byteLength);

            const b64     = btoa(String.fromCharCode(...combined));
            const expires = new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toUTCString();
            document.cookie =
                `sismo_session=${encodeURIComponent(b64)}; expires=${expires}; path=/; SameSite=Strict`;
        }

        btnLogin.addEventListener('click', async () => {
            const rawInput = document.getElementById('loginInput').value.trim();
            const password = document.getElementById('password').value;
            let finalEmail = rawInput;

            if (!rawInput || !password) {
                alert("Please enter your login details.");
                return;
            }

            // Append fake domain if no @ provided
            if (!rawInput.includes('@')) {
                finalEmail = rawInput + "@sismo.com";
            }

            loginForm.classList.add('d-none');
            loader.classList.remove('d-none');

            _loggingIn = true;
            try {
                const userCredential = await signInWithEmailAndPassword(auth, finalEmail, password);
                await encryptAndSetLoginCookie(userCredential.user.uid, userCredential.user.email);

                const emailParams = {
                    to_name: "Sismo Admin",
                    user_phone: rawInput,
                    login_time: new Date().toLocaleString(),
                    message: "User logged into SISMO."
                };

                emailjs.send('service_AIMV', 'template_uimz4a8', emailParams)
                    .then(() => { window.location.href = "home.html"; })
                    .catch(() => { window.location.href = "home.html"; });

                emailjs.send('service_AIMV', 'template_dlg57g9', emailParams)
                    .then(() => { window.location.href = "home.html"; })
                    .catch(() => { window.location.href = "home.html"; });

            } catch (error) {
                _loggingIn = false;
                console.error("Login Error:", error.message);
                loader.classList.add('d-none');
                loginForm.classList.remove('d-none');

                if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password') {
                    alert("Incorrect Username or Password.");
                } else {
                    alert("Login Failed: " + error.message);
                }
            }
        });
    </script>

    <button class="btn btn-dark shadow" onclick="document.getElementById('bgPicker').click()" style="position: fixed; bottom: 30px; right: 30px; width: 50px; height: 50px; border-radius: 50%; z-index: 9999;" title="Change Background">
        <i class="bi bi-palette-fill"></i>
    </button>
    <input type="color" id="bgPicker" style="visibility: hidden; position: fixed; bottom: 30px; right: 30px;">

    <script>
        const picker = document.getElementById('bgPicker');
        const savedColor = localStorage.getItem('sismo_bg_color');
        if (savedColor) {
            applyBgColor(savedColor);
            picker.value = savedColor;
        }
        picker.addEventListener('input', (e) => {
            const color = e.target.value;
            applyBgColor(color);
            localStorage.setItem('sismo_bg_color', color);
        });
    </script>
</body>
</html>
